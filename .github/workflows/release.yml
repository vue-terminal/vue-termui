name: Publish to npm

# When releasing for the first time, you first need to publish manually a 0.0.0
#
# npm login
# npm publish
#
# Add "repository": "posva/template-lib-ts", to package.json
# Go to the settings page on npm: https://www.npmjs.com/package/template-lib-ts/access
# Set the Trusted Published, add an environment if added on GitHub repository settings / Environments
# Disallow tokens
#
# Update this file:
# - use environment if set
# - Adapt the if condition that prevents running on forks

on:
  push:
    tags:
      - '**'

jobs:
  release:
    runs-on: ubuntu-latest
    if: |
      (startsWith(github.ref_name, 'v') || startsWith(github.ref_name, 'create-vue-termui@')) &&
      github.repository == 'vue-terminal/vue-termui'

    environment: release

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag info
        id: resolve
        run: |
          echo "Resolving tag info…"

          TAG="${GITHUB_REF#refs/tags/}"
          echo "Current tag: $TAG"
          echo "TAG=$TAG" >>$GITHUB_OUTPUT

          # Map the tag to the package it releases. "v*" is the main package
          # (vue-termui, at the root); "<name>@*" is a package under packages/.
          if [[ "$TAG" == create-vue-termui@* ]]; then
            PKG_NAME="create-vue-termui"
            PKG_DIR="packages/create-vue-termui"
            MATCH="create-vue-termui@*"
            VERSION="${TAG#create-vue-termui@}"
          else
            PKG_NAME="vue-termui"
            PKG_DIR="."
            # v[0-9]* (not v*) so previous-tag lookup skips legacy vue-termui@* tags
            MATCH="v[0-9]*"
            VERSION="${TAG#v}"
          fi

          echo "PKG_NAME=$PKG_NAME" >>$GITHUB_OUTPUT
          echo "PKG_DIR=$PKG_DIR" >>$GITHUB_OUTPUT

          # Compute previous tag for this package (skip current tag)
          echo "Finding previous tag using: git describe --match '$MATCH'"

          set +e
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match "$MATCH" "${TAG}^" 2>/dev/null)
          STATUS=$?
          set -e

          if [[ $STATUS -eq 0 ]]; then
            echo "Found previous tag: $PREVIOUS_TAG"
          else
            echo "No previous tag found. Using first commit."
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >>$GITHUB_OUTPUT

          # Determine npm dist-tag
          if [[ "$VERSION" =~ -beta ]]; then
            NPM_TAG="beta"
          elif [[ "$VERSION" =~ -alpha ]]; then
            NPM_TAG="alpha"
          elif [[ "$VERSION" =~ -rc ]]; then
            NPM_TAG="rc"
          else
            NPM_TAG="latest"
          fi

          echo "NPM_TAG=$NPM_TAG" >>$GITHUB_OUTPUT

          echo "Resolved:"
          echo "  TAG=$TAG"
          echo "  PKG_NAME=$PKG_NAME"
          echo "  PKG_DIR=$PKG_DIR"
          echo "  PREVIOUS_TAG=$PREVIOUS_TAG"
          echo "  NPM_TAG=$NPM_TAG"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ${{ steps.resolve.outputs.PKG_DIR }}
        run: pnpm run build

      - name: Publish to NPM
        working-directory: ${{ steps.resolve.outputs.PKG_DIR }}
        run: pnpm publish --access public --no-git-checks --tag ${{ steps.resolve.outputs.NPM_TAG }}

      - name: Generate GitHub Changelog
        run: pnpx changelogithub@14.0.0 --from "$FROM_TAG" --to "$TAG"
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.TAG }}
          FROM_TAG: ${{ steps.resolve.outputs.PREVIOUS_TAG }}
