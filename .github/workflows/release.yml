name: Publish to npm

# npm trusted publishing (OIDC) is configured PER PACKAGE. For every package
# this workflow publishes (vue-termui AND create-vue-termui), do the one-time
# setup on npm or the publish step 404s:
#
#   1. Publish once manually so the package exists (already true for both):
#        cd <package> && npm publish
#   2. On npm (e.g. https://www.npmjs.com/package/create-vue-termui/access):
#        Trusted Publisher -> GitHub Actions
#          org/repo:   vue-terminal/vue-termui
#          workflow:   release.yml
#          environment: release
#      Then disallow tokens.
#
# To add another package later: add it to the MAP below and set up its trusted
# publisher the same way.

on:
  push:
    tags:
      - '**' # filtered manually below, glob patterns don't work well here

jobs:
  release:
    runs-on: ubuntu-latest
    # prevent running on forks and on unrelated tags
    if: |
      (startsWith(github.ref_name, 'v') || contains(github.ref_name, '@')) &&
      github.repository == 'vue-terminal/vue-termui'

    environment: release

    permissions:
      contents: write # for the GitHub Changelog
      id-token: write # required for npm trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # needed for changelogithub

      - name: Resolve tag info
        id: resolve
        run: |
          echo "Resolving tag info…"

          TAG="${GITHUB_REF#refs/tags/}"
          echo "Current tag: $TAG"
          echo "TAG=$TAG" >>$GITHUB_OUTPUT

          # ========= Determine which package this tag releases =========
          # `v1.2.3` -> main package (vue-termui, at the root).
          # `<name>@1.2.3` -> a package looked up in MAP below.
          if [[ "$TAG" =~ ^v[0-9] ]]; then
            PKG_NAME="vue-termui"
            PACKAGE_PATH="."
            GIT_DESCRIBE_MATCH="v[0-9]*"
          else
            PKG_NAME="${TAG%@*}"
            GIT_DESCRIBE_MATCH="${PKG_NAME}@*"

            declare -A MAP=(
              ["create-vue-termui"]="packages/create-vue-termui"
            )

            if [[ -z "${MAP[$PKG_NAME]}" ]]; then
              echo "❌ Unknown package name '$PKG_NAME'" >&2
              exit 1
            fi

            PACKAGE_PATH="${MAP[$PKG_NAME]}"
          fi

          echo "PKG_NAME=$PKG_NAME" >>$GITHUB_OUTPUT
          echo "PACKAGE_PATH=$PACKAGE_PATH" >>$GITHUB_OUTPUT

          # ========= Compute previous tag (skip current tag) =========
          echo "Finding previous tag using: git describe --match '$GIT_DESCRIBE_MATCH'"

          set +e
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 --match "$GIT_DESCRIBE_MATCH" "${TAG}^" 2>/dev/null)
          STATUS=$?
          set -e

          if [[ $STATUS -eq 0 ]]; then
            echo "Found previous tag: $PREVIOUS_TAG"
          else
            echo "No previous tag found. Using first commit."
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >>$GITHUB_OUTPUT

          echo "Resolved:"
          echo "  TAG=$TAG"
          echo "  PKG_NAME=$PKG_NAME"
          echo "  PACKAGE_PATH=$PACKAGE_PATH"
          echo "  PREVIOUS_TAG=$PREVIOUS_TAG"

      - name: Install pnpm
        uses: pnpm/action-setup@v4.4.0

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ${{ steps.resolve.outputs.PACKAGE_PATH }}
        run: pnpm run build

      - name: Publish to NPM
        working-directory: ${{ steps.resolve.outputs.PACKAGE_PATH }}
        run: pnpm publish --access public --no-git-checks

      - name: Generate GitHub Changelog
        run: pnpx changelogithub@14.0.0 --from "$FROM_TAG" --to "$TAG"
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.TAG }}
          FROM_TAG: ${{ steps.resolve.outputs.PREVIOUS_TAG }}
